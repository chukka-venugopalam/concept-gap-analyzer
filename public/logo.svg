<!-- Logo Placeholder - Replace with actual logo.png (256x256 or higher) -->
<!-- This SVG will serve as a temporary placeholder until the actual logo is added -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="128" cy="128" r="128" fill="url(#logoGradient)" filter="url(#glow)"/>
  
  <!-- Inner Circle (lighter) -->
  <circle cx="128" cy="128" r="110" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Main Icon: C for ConceptGap -->
  <text 
    x="128" 
    y="148" 
    font-size="80" 
    font-weight="bold" 
    text-anchor="middle" 
    fill="white" 
    font-family="system-ui, -apple-system, sans-serif"
    letter-spacing="-2"
  >C</text>
  
  <!-- Corner Accent -->
  <circle cx="180" cy="70" r="8" fill="rgba(255,255,255,0.6)"/>
  <circle cx="180" cy="70" r="5" fill="rgba(255,255,255,0.3)"/>
</svg>
